name: Global Fleet Config Sync

on:
  push:
    branches:
      - main
    paths:
      - 'global-opencode-config/**'

jobs:
  sync-fleet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Trigger Fleet Sync via Supabase Registry & n8n
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: |
          echo "Fetching machine registry from Supabase..."
          # Pseudo-Code zur Veranschaulichung der Logik, die n8n triggert
          # Der n8n Webhook läuft auf der OCI VM und hat Zugriff auf das interne A2A-Netzwerk
          
          if [ -n "$N8N_WEBHOOK_URL" ]; then
            curl -X POST "$N8N_WEBHOOK_URL" \
                 -H "Content-Type: application/json" \
                 -d '{"event": "global_config_update", "repo": "Delqhi/opencode", "branch": "main"}'
            echo "Fleet Sync Trigger gesendet an n8n!"
          else
            echo "N8N_WEBHOOK_URL Secret fehlt, überspringe direkten Trigger."
            echo "Fallback: Maschinen müssen per Cronjob via 'git pull' pullen."
          fi
